<!DOCTYPE html>
<html lang="id">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk LiuL 💙</title>

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div id="particles"></div>

<div class="container">

<div class="glass">

<h1>💙 Untuk LiuL 💙</h1>

<div id="clock"></div>

<div class="slideshow">

<img id="slideImage"
src="https://picsum.photos/id/1015/1200/700">

<div id="caption">
Terus melangkah walau pelan 💙
</div>

</div>

<div id="letter"></div>

<div class="buttons">

<button onclick="secretMessage()">
💌 Pesan Rahasia
</button>

<button onclick="virtualHug()">
🤗 Peluk Virtual
</button>

<button onclick="motivate()">
✨ Semangat Lagi
</button>

<button onclick="fireworks()">
🎆 Kembang Api
</button>

</div>

<h2>🎵 Playlist Semangat</h2>

<audio controls loop>
<source
src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">
</audio>

<div class="chatbot">

<h2>
🤖 Chatbot Penyemangat LiuL
</h2>

<div id="chatLog"></div>

<input
id="chatInput"
placeholder="Ceritakan perasaanmu...">

<button onclick="sendMessage()">
Kirim
</button>

</div>

</div>

</div>

<div id="popup">

<div id="popupText"></div>

<button onclick="closePopup()">
Tutup
</button>

</div>

<script src="js/script.js"></script>

</body>
</html>
