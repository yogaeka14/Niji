<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Untuk LiuL 💙</title>

<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<div class="container">

<div class="glass">

<h1>💙 Untuk LiuL 💙</h1>

<div id="clock"></div>

<button id="openLetter">
💌 Buka Surat Untuk LiuL
</button>

<div id="letterBox">
<h2>Untuk LiuL 💙</h2>
<p id="letter"></p>
</div>

<div class="slideshow">

<img id="slideImage"
src="images/foto1.jpg">

<div id="caption">
💙 Kamu lebih kuat dari yang kamu kira
</div>

</div>

<div class="buttons">

<button onclick="secretMessage()">
💌 Pesan Rahasia
</button>

<button onclick="virtualHug()">
🤗 Peluk Virtual
</button>

<button onclick="motivate()">
✨ Semangat Lagi
</button>

</div>

<h2>🎵 Playlist Semangat</h2>

<select id="playlist">

<option value="music/lagu1.mp3">
Lagu 1
</option>

<option value="music/lagu2.m4a">
Lagu 2
</option>

<option value="music/lagu3.mp3">
Lagu 3
</option>

</select>

<audio
id="player"
controls>
</audio>

<div class="chatbot">

<h2>🤖 Chatbot LiuL</h2>

<div id="chatLog"></div>

<input
id="chatInput"
placeholder="Tulis sesuatu...">

<button onclick="sendMessage()">
Kirim
</button>

</div>

</div>

</div>

<div id="popup">

<div id="popupText"></div>

<button onclick="closePopup()">
Tutup
</button>

</div>

<script src="js/script.js"></script>

</body>
</html>
